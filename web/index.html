<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="hellose1913">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>hellose1913</title>
  <link rel="manifest" href="manifest.json">
  <style>
    #music-player-shell {
      bottom: 0;
      height: 90px;
      left: 0;
      opacity: 0.01;
      pointer-events: none;
      position: fixed;
      transform: translateX(-150px);
      width: 160px;
      z-index: 1;
    }

    #music-toggle {
      align-items: center;
      background: linear-gradient(135deg, #ff4fa3, #ff264f);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 999px;
      bottom: 18px;
      box-shadow: 0 12px 30px rgba(255, 38, 79, 0.35);
      color: #ffffff;
      cursor: pointer;
      display: flex;
      font: 700 15px/1 Arial, sans-serif;
      gap: 8px;
      min-height: 44px;
      padding: 0 16px;
      position: fixed;
      right: 18px;
      z-index: 9999;
    }

    #music-toggle.is-playing {
      background: rgba(255, 255, 255, 0.24);
      box-shadow: 0 10px 28px rgba(255, 255, 255, 0.22);
    }
  </style>
</head>
<body>
  <div id="music-player-shell" aria-hidden="true">
    <div id="music-player"></div>
  </div>
  <button id="music-toggle" type="button" aria-label="Bat nhac">♪ Bật nhạc</button>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    (function () {
      var videoId = '3qTCqaBV15k';
      var shell = document.getElementById('music-player-shell');
      var button = document.getElementById('music-toggle');
      var musicPlayer = null;
      var apiReady = false;
      var wantsMusic = false;

      function musicUrl() {
        return 'https://www.youtube.com/embed/' + videoId +
          '?autoplay=1&loop=1&playlist=' + videoId +
          '&controls=0&disablekb=1&enablejsapi=1&fs=0&modestbranding=1' +
          '&origin=' + encodeURIComponent(window.location.origin) +
          '&playsinline=1&rel=0&v=' + Date.now();
      }

      function updateButton(isManual) {
        button.classList.add('is-playing');
        button.textContent = isManual ? '♫ Đang phát' : '♫ Bấm nếu chưa nghe';
      }

      function playWithApi(isManual) {
        if (!musicPlayer || typeof musicPlayer.playVideo !== 'function') {
          return false;
        }

        try {
          musicPlayer.unMute();
          musicPlayer.setVolume(85);
          musicPlayer.playVideo();
          updateButton(isManual);
          return true;
        } catch (error) {
          return false;
        }
      }

      function createApiPlayer(autoplay) {
        shell.innerHTML = '<div id="music-player"></div>';
        musicPlayer = new YT.Player('music-player', {
          width: '160',
          height: '90',
          videoId: videoId,
          playerVars: {
            autoplay: autoplay ? 1 : 0,
            controls: 0,
            disablekb: 1,
            enablejsapi: 1,
            fs: 0,
            loop: 1,
            modestbranding: 1,
            origin: window.location.origin,
            playlist: videoId,
            playsinline: 1,
            rel: 0,
          },
          events: {
            onReady: function () {
              if (wantsMusic || autoplay) {
                playWithApi(false);
              }
            },
          },
        });
      }

      function fallbackIframe(isManual) {
        shell.innerHTML =
          '<iframe width="160" height="90" ' +
          'src="' + musicUrl() + '" ' +
          'title="Background music" frameborder="0" ' +
          'allow="autoplay; encrypted-media; fullscreen"></iframe>';
        updateButton(isManual);
      }

      function startMusic(isManual) {
        wantsMusic = true;

        if (apiReady) {
          if (!playWithApi(isManual)) {
            createApiPlayer(true);
            updateButton(isManual);
          }
          return;
        }

        fallbackIframe(isManual);
      }

      window.onYouTubeIframeAPIReady = function () {
        apiReady = true;
        createApiPlayer(true);
      };

      window.addEventListener('load', function () {
        setTimeout(function () {
          startMusic(false);
        }, 700);
      });

      button.addEventListener('pointerdown', function (event) {
        event.preventDefault();
        event.stopPropagation();
        startMusic(true);
      }, { capture: true });

      document.addEventListener('pointerdown', function () {
        startMusic(true);
      }, { capture: true });
      document.addEventListener('click', function () {
        startMusic(true);
      }, { capture: true });
      document.addEventListener('keydown', function () {
        startMusic(true);
      }, { capture: true });
    }());
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
